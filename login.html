<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SyllaBot — Welcome</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
</head>
<body class="bg-light">
  <nav class="navbar navbar-light bg-white shadow-sm mb-5">
    <div class="container">
      <a class="navbar-brand d-flex align-items-center" href="/">
        <img src="https://cdn-icons-png.flaticon.com/512/4712/4712104.png" width="30" class="me-2"/>
        <strong>SyllaBot</strong>
      </a>
    </div>
  </nav>

  <div class="container">
    <div class="row justify-content-center">
      <div class="col-md-6">
        <ul class="nav nav-tabs mb-4" id="loginTabs" role="tablist">
          <li class="nav-item" role="presentation">
            <button class="nav-link active" id="student-tab" data-bs-toggle="tab" data-bs-target="#student" type="button">Student</button>
          </li>
          <li class="nav-item" role="presentation">
            <button class="nav-link" id="professor-tab" data-bs-toggle="tab" data-bs-target="#professor" type="button">Professor</button>
          </li>
        </ul>
        <div class="tab-content">
          <div class="tab-pane fade show active p-4 bg-white rounded shadow-sm" id="student">
            <h5>Continue as Student</h5>
            <p>No login required—just click below to ask your syllabus questions.</p>
            <a href="{{ url_for('ask') }}" class="btn btn-primary">Go to Chatbot</a>
          </div>
          <div class="tab-pane fade p-4 bg-white rounded shadow-sm" id="professor">
            <h5>Professor Login</h5>
            <form method="POST" action="{{ url_for('login') }}">
              <div class="mb-3">
                <label for="username" class="form-label">Username</label>
                <input id="username" name="username" class="form-control" required/>
              </div>
              <div class="mb-3">
                <label for="password" class="form-label">Password</label>
                <input id="password" name="password" type="password" class="form-control" required/>
              </div>
              <button class="btn btn-primary">Login</button>
            </form>
            <hr>
            <p>First time? <a href="{{ url_for('create_account') }}">Create an account</a>.</p>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
