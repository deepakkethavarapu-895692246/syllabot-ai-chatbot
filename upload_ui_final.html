<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SyllaBot - Professor Dashboard</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" />
</head>
<body>
  <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container-fluid">
      <a class="navbar-brand d-flex align-items-center" href="/">
        <img src="https://cdn-icons-png.flaticon.com/512/4712/4712104.png" width="30" class="me-2" />
        SyllaBot - Professor
      </a>
      <div class="d-flex">
        <a href="/logout" class="btn btn-outline-light">Logout</a>
      </div>
    </div>
  </nav>

  <div class="container-fluid p-4">
    <div class="row">
      <div class="col-md-4">
        <div class="card mb-4">
          <div class="card-header">My Uploaded Courses</div>
          <ul class="list-group list-group-flush">
            {% for key, item in index.items() %}
              <li class="list-group-item">
                <strong>{{ item.course_name }}</strong><br />
                Dept: {{ item.department }} | No: {{ item.course_number }}<br />
                <small class="text-muted">{{ item.filename }}</small>
              </li>
            {% endfor %}
          </ul>
        </div>

        <div class="d-grid gap-2">
          <a href="/manage" class="btn btn-warning">🗂 Manage Uploaded Syllabi</a>
          <a href="/manage_accounts" class="btn btn-danger">👤 Manage Accounts</a>
        </div>

      </div>

      <div class="col-md-8">
        <div class="card p-4">
          <h5 class="card-title">Upload a New Syllabus</h5>
          <form method="POST" enctype="multipart/form-data">
            <div class="mb-3">
              <label class="form-label">Department</label>
              <input type="text" name="department" class="form-control" required />
            </div>
            <div class="mb-3">
              <label class="form-label">Course Number</label>
              <input type="text" name="course_number" class="form-control" required />
            </div>
            <div class="mb-3">
              <label class="form-label">Course Name</label>
              <input type="text" name="course_name" class="form-control" required />
            </div>
            <div class="mb-3">
              <label class="form-label">Upload PDF File</label>
              <input type="file" name="file" class="form-control" required />
            </div>
            <button type="submit" class="btn btn-success">Upload</button>
          </form>
        </div>
      </div>

    </div>
  </div>
</body>
</html>
